<!DOCTYPE html>
<html>
<head>
    <title>Your Cart</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-5">
    <h2>Your Cart</h2>

    {% if items %}
        <table class="table table-bordered">
            <tr>
                <th>Food</th>
                <th>Quantity</th>
                <th>Subtotal</th>
            </tr>

            {% for item in items %}
            <tr>
                <td>{{ item.food.name }}</td>
                <td>{{ item.quantity }}</td>
                <td>₹{{ item.subtotal }}</td>
            </tr>
            {% endfor %}
        </table>

        <h4>Total: ₹{{ total }}</h4>

        <a href="{% url 'place_order' %}" class="btn btn-success mt-3">
    Place Order
</a>

        <a href="{% url 'clear_cart' %}" class="btn btn-danger mt-3 ms-2">
    Clear Cart
</a>

        <a href="/" class="btn btn-secondary">Continue Ordering</a>

    {% else %}
        <p>Your cart is empty.</p>
        <a href="/" class="btn btn-primary">Go to Menu</a>
    {% endif %}

</div>

</body>
</html>
